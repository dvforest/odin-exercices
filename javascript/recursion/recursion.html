<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recursion</title>
  </head>
  <body></body>
  <script>
    function sumRange(x) {
      if (x === 1) {
        return 1;
      } else {
        return (x += sumRange(x - 1));
      }
    }
    console.log(sumRange(6));
  </script>
</html>
