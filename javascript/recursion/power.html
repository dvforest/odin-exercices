<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Power</title>
  </head>
  <body></body>
  <script>
    function power(x, p) {
      if (p === 0) {
        return 1;
      } else {
        return (x *= power(x, p - 1));
      }
    }
    console.log(power(2, 4));
  </script>
</html>
