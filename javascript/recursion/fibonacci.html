<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibonacci Sequence</title>
  </head>
  <body></body>
  <script>
    function fibonacci(n) {
      if (n < 2) {
        return n;
      } else {
        return fibonacci(n - 1) + fibonacci(n - 2);
      }
    }

    function fibsArray(n, seq = []) {
      if (n < 2) {
        seq[n] = n;
      } else {
        seq[n] = fibsArray(n - 1, seq)[n - 1] + fibsArray(n - 2, seq)[n - 2];
      }
      return seq;
    }

    function fibsIterate(n) {
      const seq = [];
      for (let i = 0; i < n; i++) {
        if (i < 2) {
          seq.push(i);
        } else {
          seq.push(seq[i - 1] + seq[i - 2]);
        }
      }
      return seq;
    }

    console.log(fibsArray(10));
  </script>
</html>
