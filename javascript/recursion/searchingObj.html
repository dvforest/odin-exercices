<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Searching Object</title>
  </head>
  <body></body>
  <script>
    var nestedObject = {
      data: {
        info: {
          stuff: {
            thing: {
              moreStuff: {
                magicNumber: 44,
                something: "foo2",
              },
            },
          },
        },
      },
    };

    let hasIt = contains(nestedObject, 44);
    let doesntHaveIt = contains(nestedObject, "foo");

    console.log(hasIt);
    console.log(doesntHaveIt);

    function contains(obj, value) {
      for (let key in obj) {
        if (obj[key] === value) {
          return true;
        }
        if (typeof obj[key] === "object" && obj[key] !== null) {
          if (contains(obj[key], value)) {
            return true;
          }
        }
      }
      return false;
    }
  </script>
</html>
