<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Count Squares</title>
  </head>
  <body></body>
  <script>
    var l = [1, 2, 3];
    console.log(SumSquares(l)); // 1 + 4 + 9 = 14

    l = [[1, 2], 3];
    console.log(SumSquares(l)); // 1 + 4 + 9 = 14

    l = [[[[[[[[[1]]]]]]]]];
    console.log(SumSquares(l)); // 1 = 1

    l = [10, [[10], 10], [10]];
    console.log(SumSquares(l)); // 100 + 100 + 100 + 100 = 400
  </script>
</html>
